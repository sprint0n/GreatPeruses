{% extends 'Book/base.html' %} {% block body %}
<div class="row justify-content-center py-5">
  <div class="col-md-6 col-lg-5">
    <div class="card auth-card shadow-lg">
      <div
        class="card-header bg-primary text-white text-center py-4 border-0"
        style="border-radius: 1rem 1rem 0 0"
      >
        <h3 class="fw-bold mb-0">Create Account</h3>
      </div>
      <div class="card-body p-4 p-md-5">
        <form method="POST">
          {% csrf_token %} {{ form.as_p }}
          <button
            type="submit"
            class="btn btn-primary w-100 py-2 fw-bold shadow-sm mt-3"
          >
            Sign Up
          </button>
        </form>
      </div>
      <div class="card-footer bg-transparent text-center py-3 border-0">
        <p class="mb-0 small text-muted">
          Already have an account?
          <a
            href="{% url 'login' %}"
            class="text-primary fw-bold text-decoration-none"
            >Log In</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
